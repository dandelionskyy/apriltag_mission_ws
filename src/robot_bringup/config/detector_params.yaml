# AprilTag Detector Parameters
# pupiL_apriltags detector configuration

detector:
  families: "tag36h11"    # AprilTag family
  nthreads: 4             # Number of CPU threads
  quad_decimate: 1.0      # Decimation factor (1.0 = no decimation)
  quad_sigma: 0.0         # Gaussian blur sigma (0 = no blur)
  refine_edges: 1         # Edge refinement enabled
  decode_sharpening: 0.25 # Sharpening factor for decoding
  debug: 0                # Debug output (0 = off)

  # Physical tag size (side length in meters)
  tag_size: 0.16          # 16cm tags

  # Camera intrinsics (RealSense D455 color 640x480)
  # These are defaults; set use_camera_info_topic: true to auto-load
  camera_intrinsics:
    fx: 615.0
    fy: 615.0
    cx: 320.0
    cy: 240.0
  use_camera_info_topic: false

  # Input image topic
  image_topic: "/camera/color/image_raw"

  # Target tag ID (-1 = publish for all tags)
  target_tag_id: -1
