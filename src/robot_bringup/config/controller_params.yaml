/**:
  ros__parameters:
    robot_type: "parallel"
    serial:
      kp_dist: 0.5
      kp_x: 0.3
      kp_yaw: 1.0
    parallel:
      kp_yaw: 1.0
      kp_x: 0.4
      kp_dist: 0.3
      yaw_decay: 0.3        # yaw 阻尼衰减系数 (rad): e_yaw达到此值时阻尼≈0.37
      x_decay: 0.15          # 横向阻尼衰减系数 (m): e_x达到此值时阻尼≈0.37
    target_distance: 0.5
    max_linear_vel: 0.2
    max_angular_vel: 0.5
    enable: true
